model: Qwen/Qwen2.5-3B
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# batch_size=2, seq=512: activations are small, no OOM, no gradient checkpointing needed
batch_size: 2
grad_accumulation: 16
lr: 2e-4
warmup_steps: 100
epochs: 3
max_seq_len: 512

data_dir: data/processed
output_dir: checkpoints/qwen-cricket
logging_steps: 20
eval_steps: 200
save_steps: 200
